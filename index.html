<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? | 맞춤형 메뉴 추천</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>오늘 뭐 먹지? 🍲</h1>
            <p>언제, 어떤 음식을 먹고 싶나요?</p>
        </header>

        <main>
            <!-- 메인 카테고리 -->
            <div class="category-tabs main-tabs">
                <button class="tab-btn active" data-category="lunch">점메추</button>
                <button class="tab-btn" data-category="dinner">저메추</button>
                <button class="tab-btn" data-category="lateNight">야식</button>
                <button class="tab-btn" data-category="dessert">디저트</button>
                <div class="tab-slider"></div>
            </div>

            <!-- 서브 카테고리 (디저트 제외하고 표시) -->
            <div class="sub-category-tabs" id="subTabs">
                <button class="sub-tab-btn active" data-sub="all">전체</button>
                <button class="sub-tab-btn" data-sub="korean">한식</button>
                <button class="sub-tab-btn" data-sub="japanese">일식</button>
                <button class="sub-tab-btn" data-sub="chinese">중식</button>
                <button class="sub-tab-btn" data-sub="western">양식</button>
                <button class="sub-tab-btn" data-sub="others">기타</button>
            </div>

            <div class="result-card" id="resultCard">
                <div class="result-placeholder">시간대와 음식 종류를 고르고<br>버튼을 눌러보세요!</div>
                
                <div class="loading-container hidden" id="loadingContainer">
                    <div class="spinner"></div>
                    <p class="loading-text">취향 저격 메뉴 고르는 중...</p>
                </div>

                <div class="result-content hidden" id="resultContent">
                    <div class="tag-group">
                        <span class="category-tag main-tag" id="resultMainTag"></span>
                        <span class="category-tag sub-tag" id="resultSubTag"></span>
                    </div>
                    <h2 id="resultMenu">제육볶음</h2>
                    <p id="resultEmoji">🍱</p>
                    <a id="naverSearchBtn" class="sub-btn" target="_blank">네이버에서 맛집 찾기 🔍</a>
                </div>
            </div>

            <div class="actions">
                <button id="recommendBtn" class="main-btn">메뉴 추천받기!</button>
            </div>

            <div class="local_storage">
                <button id="recommendHistoryBtn" class="sub-btn">추천 히스토리 💾</button>
                <button id="BookmarkBtn" class="sub-btn">북마크 ⭐</button>
            </div>
        </main>

        <footer>
            <p>© 2026 메뉴 추천 전문가</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
